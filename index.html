<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Configurações do PWA -->
    <title>Profilaxia da Raiva Humana</title>
    <meta name="description" content="Software de apoio à decisão na profilaxia da raiva humana.">
    <meta name="theme-color" content="#2e7d32">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">

    <!-- Compatibilidade com dispositivos móveis -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="AAR App">

    <!-- Estilo -->
    <link rel="stylesheet" href="assets/style.css">
</head>

<body>
    <div class="main-container">
        <main class="page-width center">

            <h1 class="title">PROFILAXIA DA RAIVA HUMANA</h1>

            <aside class="navbar pb-sm mb-sm">
                <div class="open-tutorial">
                    <popup-trigger popup-target="tutorial-modal">
                        Como usar o Software?
                    </popup-trigger>
                </div>
            </aside>

            <section class="form-container">
                <form id="caso" method="get">

                    <!-- ANIMAL AGRESSOR -->
                    <fieldset id="animal-agressor">
                        <legend>ANIMAL AGRESSOR</legend>

                        <div class="choice">
                            <input id="cao-gato-sem-sinais" type="radio" name="animal-agressor" value="cao-gato-sem-sinais" required>
                            <label for="cao-gato-sem-sinais">
                                <b>CÃO OU GATO</b> – PASSÍVEL DE OBSERVAÇÃO POR 10 DIAS E SEM SINAIS SUGESTIVOS DE RAIVA
                            </label>
                        </div>

                        <div class="choice">
                            <input id="cao-gato-com-sinais" type="radio" name="animal-agressor" value="cao-gato-com-sinais" required>
                            <label for="cao-gato-com-sinais">
                                <b>CÃO OU GATO</b> – NÃO PASSÍVEL DE OBSERVAÇÃO OU COM SINAIS SUGESTIVOS DE RAIVA
                            </label>
                        </div>

                        <div class="choice">
                            <input id="interesse-economico" type="radio" name="animal-agressor" value="interesse-economico" required>
                            <label for="interesse-economico">
                                <b>MAMÍFERO DOMÉSTICO DE INTERESSE ECONÔMICO</b>
                            </label>
                        </div>

                        <div class="choice">
                            <input id="mamiferos-silvestres" type="radio" name="animal-agressor" value="mamiferos-silvestres" required>
                            <label for="mamiferos-silvestres">
                                <b>MAMÍFEROS SILVESTRES</b>
                            </label>
                        </div>

                        <div class="choice">
                            <input id="morcegos" type="radio" name="animal-agressor" value="morcegos" required>
                            <label for="morcegos"><b>MORCEGOS</b></label>
                        </div>

                        <div class="link-imagens">
                            <a href="./animais-transmissores-raiva.html">
                                Clique aqui para conhecer alguns animais transmissores da raiva
                            </a>
                        </div>
                    </fieldset>

                    <!-- TIPO DE EXPOSIÇÃO -->
                    <fieldset id="tipo-exposicao">
                        <legend>TIPO DE EXPOSIÇÃO</legend>

                        <div class="choice">
                            <input id="contato-indireto" type="radio" name="exposicao" value="contato-indireto" required>
                            <label for="contato-indireto"><b>CONTATO INDIRETO</b></label>
                        </div>

                        <div class="choice">
                            <input id="leve" type="radio" name="exposicao" value="leve" required>
                            <label for="leve"><b>LEVE</b></label>
                        </div>

                        <div class="choice">
                            <input id="grave" type="radio" name="exposicao" value="grave" required>
                            <label for="grave"><b>GRAVE</b></label>
                        </div>
                    </fieldset>
                </form>
            </section>

            <!-- RESULTADO -->
            <section class="answer-container">
                <fieldset class="answer">
                    <legend>PROTOCOLO RECOMENDADO</legend>
                    <p>Selecione as opções para visualizar a conduta profilática.</p>
                </fieldset>
            </section>

        </main>
    </div>

    <!-- Imagens Animadas -->
    <random-mov-image src="assets/img/morcego.png" width="90" height="90" move-interval="3000"></random-mov-image>
    <random-mov-image src="assets/img/morcego.png" width="80" height="80" move-interval="3500"></random-mov-image>
    <random-mov-image src="assets/img/morcego.png" width="100" height="100" move-interval="4000"></random-mov-image>

    <!-- Scripts -->
    <script src="assets/script.js"></script>
    <script src="assets/ConditionalContent.js"></script>
    <script src="assets/PopupTrigger.js"></script>
    <script src="assets/PopupButton.js"></script>
    <script src="assets/RandomMovImage.js"></script>
    <script src="assets/PopupModal.js"></script>
    <script src="assets/AutoOpenPopupModal.js"></script>

    <!-- Registro do Service Worker -->
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", function () {
                navigator.serviceWorker.register("service-worker.js")
                    .then(function (registration) {
                        console.log("Service Worker registrado com sucesso:", registration.scope);
                    })
                    .catch(function (error) {
                        console.error("Erro ao registrar o Service Worker:", error);
                    });
            });
        }
    </script>
</body>
</html>
