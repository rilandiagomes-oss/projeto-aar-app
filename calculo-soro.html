<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style.css">
    <title>Cálculo do soro</title>
</head>
<body>
    
    <main>
        <h1 class="title">CÁLCULO DO SORO</h1>
        <section class="form-container">
            
            <form id="caso" method="get">
                <label for="tipoSoro">Tipo de soro:</label>
                    <select id="tipoSoro">
                    <option value="heterologo">Heterólogo (animal)</option>
                    <option value="homologo">Homólogo (humano)</option>
                    </select>

                    <label for="peso">Peso do paciente (kg):</label>
                    <input type="number" id="peso" placeholder="Digite o peso em kg" required>

                    <button onclick="calcularSoro()">Calcular</button>

                    <div class="result" id="resultado"></div>
                </fieldset>
        </section>
        <section id="resposta"></section>
    </main>
    <script src="assets/script.js"></script>
</body>
</html>
